<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Word Practice</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;text-align:center;padding:20px;margin:0;background:#f9f9f9;}
.container{
  max-width:700px;
  margin:0 auto;
  background:white;
  padding:20px; /* 稍微缩小内边距，给标题更多空间 */
  border-radius:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
  overflow:hidden; /* 防止内容溢出 */
}
/* 关键修改：缩小字号+强制不换行+居中 */
h1{
  color:#e67e22;
  margin-bottom:20px;
  white-space: nowrap;
  font-size: 28px; /* 再缩小字号，确保手机端不越界 */
  text-align: center;
}

.file-select{
  margin:20px 0;
  font-size:22px; /* 稍微缩小，避免和标题抢空间 */
}
#fileSelect{
  width:200px;
  height:45px;
  font-size:20px;
  text-align:center;
  border:3px solid #3498db;
  border-radius:8px;
}
#fileConfirm{
  height:45px;
  font-size:20px;
  padding:0 20px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.day-filter{
  margin:20px 0;
  font-size:22px;
  display:none;
}
#dayNum{
  width:100px;
  height:45px;
  font-size:22px;
  text-align:center;
  border:3px solid #3498db;
  border-radius:8px;
}
#filterBtn{
  height:45px;
  font-size:22px;
  padding:0 20px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.export-switch{
  margin:15px 0;
  display:none;
}
#exportBtn{
  padding:10px 25px;
  font-size:20px;
  border:none;
  border-radius:8px;
  background:#e74c3c;
  color:white;
  cursor:pointer;
}

.meaning{font-size:26px;margin:20px 0;}
.word{font-size:44px;font-weight:bold;color:#e74c3c;margin:20px 0;display:none;}
button{font-size:20px;padding:10px 20px;margin:8px;border:none;border-radius:8px;color:white;cursor:pointer;}
.show-btn{background:#9b59b6;}
.read-btn{background:#3498db;}
.next-btn{background:#27ae60;}

.tip{font-size:16px;color:#666;margin-top:10px;}
.loading{font-size:22px;color:#3498db;margin:20px 0;}
.error{font-size:22px;color:#e74c3c;margin:20px 0;}
</style>
</head>
<body>
<div class="container">
  <h1>🌟 Kids Word Practice 🌟</h1>

  <div class="file-select">
    Select File:
    <select id="fileSelect">
      <option value="">Loading files...</option>
    </select>
    <button id="fileConfirm">Confirm</button>
  </div>

  <div class="day-filter" id="dayFilterArea">
    Enter Day:
    <input type="number" id="dayNum" min="1" max="20" placeholder="1">
    <button id="filterBtn">Filter</button>
  </div>

  <div class="export-switch" id="exportArea">
    <button id="exportBtn">📋 Show All Words</button>
  </div>

  <div id="wordContent">Please select a file first</div>
</div>

<script>
let allWords = [];
let filteredWords = [];
let currentIdx = 0;
let currentFileName = "";
const synth = window.speechSynthesis;

async function loadFileList() {
  const select = document.getElementById('fileSelect');
  try {
    const res = await fetch('https://raw.githubusercontent.com/ximonlam/word-review/main/fileList.json');
    if (!res.ok) throw new Error('Config file load failed');
    const config = await res.json();
    const files = config.files || [];
    select.innerHTML = '';
    if (files.length === 0) {
      select.innerHTML = '<option value="">No files found</option>';
      return;
    }
    files.forEach(file => {
      const option = document.createElement('option');
      option.value = file;
      option.textContent = file;
      select.appendChild(option);
    });
  } catch (e) {
    select.innerHTML = `<option value="">Load error: ${e.message}</option>`;
  }
}

async function loadSelectedFile(fileName) {
  if (!fileName) {
    alert('Please select a valid file!');
    return;
  }
  currentFileName = fileName;
  document.getElementById("wordContent").innerHTML = "Loading file...";
  try {
    const url = `https://raw.githubusercontent.com/ximonlam/word-review/main/${fileName}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('File not found');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    allWords = data.filter(x => x.word && x.meaning && x.day).map(x => ({
      word: x.word,
      meaning: x.meaning,
      day: Number(x.day)
    }));
    filteredWords = [...allWords];
    currentIdx = 0;
    document.getElementById("dayFilterArea").style.display = "block";
    document.getElementById("exportArea").style.display = "block";
    showWord();
  } catch (e) {
    document.getElementById("wordContent").innerHTML = `Load failed: ${e.message}`;
  }
}

function filterByDay() {
  const day = Number(document.getElementById("dayNum").value);
  if (isNaN(day) || day < 1) {
    alert('Please enter a valid day (1+)!');
    return;
  }
  filteredWords = allWords.filter(x => x.day === day);
  currentIdx = 0;
  showWord();
}

function getVoices() {
  return new Promise(resolve => {
    let v = synth.getVoices();
    if (v.length) resolve(v);
    else synth.onvoiceschanged = () => resolve(synth.getVoices());
  });
}

async function speak(word) {
  const voices = await getVoices();
  synth.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.8;
  const female = voices.find(v =>
    v.lang.includes("en") &&
    (v.name.includes("Female") || v.name.includes("Samantha") || v.name.includes("Google"))
  );
  if (female) u.voice = female;
  synth.speak(u);
}

function read3Times(word) {
  clearInterval(window.readTimer);
  let c = 0;
  speak(word); c++;
  window.readTimer = setInterval(() => {
    if (c < 3) { speak(word); c++; }
    else clearInterval(window.readTimer);
  }, 2000);
}

function showWord() {
  clearInterval(window.readTimer);
  const el = document.getElementById("wordContent");
  if (filteredWords.length === 0) {
    el.innerHTML = "No words for this day";
    return;
  }
  if (currentIdx >= filteredWords.length) {
    el.innerHTML = "🎉 Practice Complete!";
    return;
  }
  const w = filteredWords[currentIdx];
  el.innerHTML = `
    <div class="meaning">💡 ${w.meaning}</div>
    <div class="word" id="w">${w.word.toUpperCase()}</div>
    <button class="show-btn" onclick="document.getElementById('w').style.display='block'">👀 Show Word</button>
    <button class="read-btn" onclick="read3Times('${w.word}')">🔊 Read 3x</button>
    <button class="next-btn" onclick="next()">➡️ Next</button>
    <div class="tip">File: ${currentFileName}  Day: ${w.day}</div>
  `;
}

function next() {
  currentIdx++;
  showWord();
}

function showAllWords() {
  if (allWords.length === 0) {
    alert('No words to show!');
    return;
  }
  let win = window.open("", "_blank", "width=800,height=600");
  let html = `
  <html>
  <head>
  <meta charset="utf-8">
  <style>body{font-family:Arial;padding:20px;}
  table{border-collapse:collapse;width:100%;}
  th,td{border:1px solid #ccc;padding:10px;text-align:center;}</style>
  </head>
  <body>
  <h2>${currentFileName} - All Words</h2>
  <table>
  <tr><th>Day</th><th>Word</th><th>Meaning</th></tr>
  `;
  allWords.forEach(w => {
    html += `<tr><td>${w.day}</td><td>${w.word}</td><td>${w.meaning}</td></tr>`;
  });
  html += `</table><div style="text-align:center;color:#666;">Total: ${allWords.length} words</div></body></html>`;
  win.document.write(html);
  win.document.close();
}

document.addEventListener('DOMContentLoaded', () => {
  loadFileList();
  document.getElementById("fileConfirm").onclick = () => {
    const f = document.getElementById("fileSelect").value;
    loadSelectedFile(f);
  };
  document.getElementById("filterBtn").onclick = filterByDay;
  document.getElementById("exportBtn").onclick = showAllWords;
});
</script>
</body>
</html>
