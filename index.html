<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶貝英文單字複習</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial,微軟雅黑;text-align:center;background:#f9f9f9;padding:20px;}
.container{max-width:600px;margin:30px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
h1{color:#e67e22;}
.meaning{font-size:28px;color:#2c3e50;margin:20px 0;}
.word{font-size:48px;font-weight:bold;color:#e74c3c;margin:20px 0;display:none;}
button{font-size:22px;padding:14px 30px;margin:8px;border:none;border-radius:10px;color:white;cursor:pointer;}
.show-btn{background:#9b59b6;}
.read-btn{background:#3498db;}
.next-btn{background:#27ae60;}
</style>
</head>
<body>
<div class="container">
<h1>🌟 寶貝的英文單字複習 🌟</h1>
<div id="content">載入中...</div>
</div>

<script>
let allWords = [];
let currentIndex = 0;
let synth = window.speechSynthesis;

// 提前載入語音
function loadVoices() {
  return new Promise(resolve => {
    let voices = synth.getVoices();
    if (voices.length > 0) {
      resolve(voices);
      return;
    }
    synth.onvoiceschanged = () => {
      voices = synth.getVoices();
      resolve(voices);
    };
  });
}

// 讀英文單字（女聲）
async function speak(word) {
  const voices = await loadVoices();
  synth.cancel();

  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.8;

  // 優先選 女聲
  const femaleVoice = voices.find(v => 
    v.lang.includes('en-US') && 
    (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google'))
  );
  if (femaleVoice) u.voice = femaleVoice;

  synth.speak(u);
}

// 讀3次，間隔2秒
function read3Times(word) {
  clearInterval(window.t);
  let c = 0;
  speak(word); c++;
  window.t = setInterval(() => {
    if (c < 3) { speak(word); c++; }
    else clearInterval(window.t);
  }, 2000);
}

// 讀取 Excel
async function loadWords() {
  const res = await fetch('words.xlsx');
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf, { type:'array' });
  const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  allWords = data.filter(x => x.word && x.meaning);
  show();
}

function show() {
  clearInterval(window.t);
  if (currentIndex >= allWords.length) {
    document.getElementById('content').innerHTML = `<div>🎉 全部複習完了！</div>`;
    return;
  }
  const w = allWords[currentIndex];
  document.getElementById('content').innerHTML = `
    <div class="meaning">💡 ${w.meaning}</div>
    <div class="word" id="w">${w.word.toUpperCase()}</div>
    <button class="show-btn" onclick="document.getElementById('w').style.display='block'">👀 顯示單字</button>
    <button class="read-btn" onclick="read3Times('${w.word}')">🔊 朗讀3次</button>
    <button class="next-btn" onclick="next()">➡️ 下一個</button>
  `;
}

function next() { currentIndex++; show(); }
loadWords();
</script>
</body>
</html>
