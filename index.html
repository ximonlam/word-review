<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶貝單字複習</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;text-align:center;background:#f9f9f9;padding:20px;}
.container{max-width:600px;margin:30px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
h1{color:#e67e22;}
#msg{color:red;margin:10px 0;}
.word{font-size:40px;font-weight:bold;margin:20px 0;display:none;}
.meaning{font-size:24px;color:#2c3e50;}
button{font-size:20px;padding:12px 25px;margin:8px;border:none;border-radius:10px;color:white;background:#3498db;cursor:pointer;}
</style>
</head>
<body>
<div class="container">
<h1>🌟 寶貝的英文單字複習 🌟</h1>
<div id="msg">載入中...</div>
<div id="wordArea"></div>
</div>

<script>
let list = [];
let idx = 0;

async function start(){
  const res = await fetch("words.xlsx");
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf, {type:"array"});
  const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  const today = "2026-03-13";
  list = data.filter(x => (x.date || "").trim() == today);

  document.getElementById("msg").innerText = `✅ 找到 ${list.length} 個今日單字`;
  show();
}

function show(){
  if(idx >= list.length){
    document.getElementById("wordArea").innerHTML = "<div>🎉 全部複習完了！</div>";
    return;
  }
  const w = list[idx];
  document.getElementById("wordArea").innerHTML = `
    <div class="meaning">${w.meaning}</div>
    <div class="word" id="w">${w.word}</div>
    <button onclick="document.getElementById('w').style.display='block'">顯示單字</button>
    <button onclick="next()">下一個</button>
  `;
}

function next(){ idx++; show(); }
start();
</script>
</body>
</html>
