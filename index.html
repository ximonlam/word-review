<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝贝的英文单词复习</title>
    <!-- Add SheetJS library to parse XLSX files -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: Arial, 微软雅黑;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f9f9f9;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e67e22;
            font-size: 36px;
            margin-bottom: 30px;
        }
        .date-info {
            font-size: 20px;
            color: #3498db;
            margin-bottom: 20px;
        }
        .word-card {
            margin: 40px 0;
        }
        .meaning {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .word {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 30px 0;
            display: none; /* 默认隐藏单词 */
        }
        .read-count {
            font-size: 22px;
            color: #95a5a6;
            margin-bottom: 20px;
        }
        button {
            font-size: 24px;
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
        }
        .show-word-btn {
            background-color: #9b59b6;
        }
        .next-btn {
            background-color: #27ae60;
        }
        .repeat-btn {
            background-color: #3498db;
        }
        .no-word {
            font-size: 28px;
            color: #2c3e50;
            margin: 50px 0;
        }
        button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        .debug-info {
            font-size: 14px;
            color: #e74c3c;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 宝贝的英文单词复习 🌟</h1>
        <div class="debug-info" id="debugInfo">正在加载单词表 (XLSX)...</div>
        <div class="date-info" id="dateInfo"></div>
        <div id="wordContent">
            <div class="no-word">请稍候，正在加载数据...</div>
        </div>
    </div>

    <script>
        let wordDatabase = [];
        let todayWords = [];
        let currentIndex = 0;
        const speechRate = 0.8;
        const pauseTime = 2000;

        // ✅ Read XLSX file from GitHub root (words.xlsx)
        const XLSX_URL = "https://ximonlam.github.io/word-review/words.xlsx";

        // Smart date format conversion
        function smartConvertDate(dateStr) {
            if (!dateStr) return "";
            dateStr = dateStr.replace(/-/g, "/");
            const parts = dateStr.split("/").filter(p => p);
            if (parts.length !== 3) return dateStr;

            if (parts[0].length === 4) {
                return `${parts[0]}-${parts[1].padStart(2, "0")}-${parts[2].padStart(2, "0")}`;
            } else if (parts[2].length === 4) {
                return `${parts[2]}-${parts[1].padStart(2, "0")}-${parts[0].padStart(2, "0")}`;
            }
            return dateStr;
        }

        // Load and parse XLSX file from GitHub
        async function loadGitHubXLSX() {
            try {
                const response = await fetch(XLSX_URL);
                if (!response.ok) throw new Error(`Request failed: ${response.status}`);
                
                // Read XLSX as binary data
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: "array" });
                
                // Get the first worksheet (you can change to specific sheet name e.g., "Sheet1")
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // Convert worksheet to JSON (same structure as CSV)
                const data = XLSX.utils.sheet_to_json(worksheet);
                if (data.length === 0) throw new Error("XLSX content is empty");

                // Format data (match CSV structure)
                wordDatabase = data.map(item => ({
                    word: (item.word || "").toString().trim(),
                    meaning: (item.meaning || "").toString().trim(),
                    date: smartConvertDate((item.date || "").toString().trim())
                })).filter(item => item.word);

                document.getElementById('debugInfo').textContent = `✅ Loaded ${wordDatabase.length} words`;
                init();
            } catch (err) {
                document.getElementById('debugInfo').textContent = `❌ Load failed: ${err.message}`;
                console.error("Load details:", err);
            }
        }

        // Initialize: Match today's date
        function init() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const systemToday = `${year}-${month}-${day}`;

            document.getElementById('dateInfo').textContent = `📅 Today: ${systemToday}`;
            todayWords = wordDatabase.filter(word => word.date === systemToday);
            document.getElementById('debugInfo').textContent += ` | Matched ${todayWords.length} words for today`;

            if (todayWords.length === 0) {
                document.getElementById('wordContent').innerHTML = `<div class="no-word">🎉 No words to review today!</div>`;
                return;
            }
            currentIndex = 0;
            showWord(currentIndex);
        }

        // Read word aloud
        function speakWord(word, count) {
            const readCountEl = document.querySelector('.read-count');
            if (readCountEl) readCountEl.textContent = `Reading ${count}th time...`;
            
            setTimeout(() => {
                if (!window.speechSynthesis) {
                    if (readCountEl) readCountEl.textContent = "⚠️ Browser does not support speech";
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = speechRate;
                window.speechSynthesis.speak(utterance);
                utterance.onend = () => {
                    if (readCountEl) readCountEl.textContent = `Finished ${count}th time ✨`;
                };
            }, pauseTime);
        }

        function readWordThreeTimes(word) {
            const readCountEl = document.querySelector('.read-count');
            if (readCountEl) readCountEl.textContent = '';
            speakWord(word, 1);
            setTimeout(() => speakWord(word, 2), pauseTime + 2000);
            setTimeout(() => speakWord(word, 3), pauseTime * 2 + 4000);
        }

        function showWord(index) {
            if (index >= todayWords.length) {
                document.getElementById('wordContent').innerHTML = `<div class="no-word">🎊 Congratulations! All words reviewed!</div>`;
                return;
            }
            const word = todayWords[index];
            document.getElementById('wordContent').innerHTML = `
                <div class="word-card">
                    <div class="meaning">💡 Chinese: ${word.meaning}</div>
                    <div class="word" id="currentWord">${word.word.toUpperCase()}</div>
                    <div class="read-count"></div>
                    <button class="show-word-btn" onclick="showCurrentWord()">👀 Show Word</button>
                    <button class="repeat-btn" onclick="readWordThreeTimes('${word.word}')">🔄 Read Again</button>
                    <button class="next-btn" onclick="nextWord()">➡️ Next Word</button>
                </div>
            `;
            readWordThreeTimes(word.word);
        }

        function showCurrentWord() {
            document.getElementById('currentWord').style.display = 'block';
        }

        function nextWord() {
            currentIndex++;
            showWord(currentIndex);
        }

        // Load XLSX when page loads
        window.onload = loadGitHubXLSX;
    </script>
</body>
</html>
