<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>еҜ¶иІқзҡ„иӢұж–Үе–®еӯ—иӨҮзҝ’</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: Arial, еҫ®и»ҹйӣ…й»‘;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f9f9f9;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e67e22;
            font-size: 36px;
            margin-bottom: 30px;
        }
        .meaning {
            font-size: 28px;
            color: #2c3e50;
            margin: 20px 0;
        }
        .word {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 30px 0;
            display: none; /* й»ҳи®Өйҡҗи—ҸеҚ•иҜҚ */
        }
        button {
            font-size: 24px;
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
        }
        .show-btn {
            background-color: #9b59b6;
        }
        .next-btn {
            background-color: #27ae60;
        }
        button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        .loading {
            font-size: 24px;
            color: #3498db;
            margin: 50px 0;
        }
        .finish {
            font-size: 28px;
            color: #27ae60;
            margin: 50px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>рҹҢҹ еҜ¶иІқзҡ„иӢұж–Үе–®еӯ—иӨҮзҝ’ рҹҢҹ</h1>
        <div id="content" class="loading">ијүе…Ҙдёӯ...</div>
    </div>

    <script>
        let allWords = [];
        let currentIndex = 0;

        // иҜ»еҸ–Excelж–Үд»¶пјҲеҸӘеҸ–wordе’ҢmeaningеҲ—пјү
        async function loadWords() {
            try {
                // иҜ»еҸ–GitHubж №зӣ®еҪ•зҡ„words.xlsx
                const response = await fetch('words.xlsx');
                if (!response.ok) throw new Error("з„Ўжі•и®ҖеҸ–Excelж–Үд»¶");
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // иҪ¬жҚўдёәJSONпјҢеҸӘдҝқз•ҷwordе’Ңmeaning
                allWords = XLSX.utils.sheet_to_json(worksheet).map(item => ({
                    word: item.word || '',
                    meaning: item.meaning || ''
                })).filter(item => item.word.trim() && item.meaning.trim()); // иҝҮж»Өз©әеҚ•иҜҚ
                
                if (allWords.length === 0) {
                    document.getElementById('content').innerHTML = '<div class="loading">вқҢ жІ’жңүжүҫеҲ°жңүж•Ҳе–®еӯ—</div>';
                    return;
                }
                
                // жҳҫзӨәз¬¬дёҖдёӘеҚ•иҜҚ
                showCurrentWord();
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="loading">вқҢ ијүе…ҘеӨұж•—пјҡ${error.message}</div>`;
            }
        }

        // жҳҫзӨәеҪ“еүҚеҚ•иҜҚ
        function showCurrentWord() {
            if (currentIndex >= allWords.length) {
                document.getElementById('content').innerHTML = '<div class="finish">рҹҺү жүҖжңүе–®еӯ—иӨҮзҝ’е®ҢжҲҗпјҒ</div>';
                return;
            }

            const wordItem = allWords[currentIndex];
            document.getElementById('content').innerHTML = `
                <div class="meaning">рҹ’Ў дёӯж–Үпјҡ${wordItem.meaning}</div>
                <div class="word" id="wordText">${wordItem.word.toUpperCase()}</div>
                <button class="show-btn" onclick="document.getElementById('wordText').style.display='block'">рҹ‘Җ йЎҜзӨәе–®еӯ—</button>
                <button class="next-btn" onclick="nextWord()">вһЎпёҸ дёӢдёҖеҖӢ</button>
            `;
        }

        // дёӢдёҖдёӘеҚ•иҜҚ
        function nextWord() {
            currentIndex++;
            showCurrentWord();
        }

        // йЎөйқўеҠ иҪҪе®ҢжҲҗеҗҺжү§иЎҢ
        window.onload = loadWords;
    </script>
</body>
</html>
